stages:
  - deploy

variables:
  SNOWFLAKE_CONNECTION_NAME: au_demo44

# Deploys the Streamlit app to Snowflake on every push to main.
#
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#   SNOWFLAKE_ACCOUNT    - e.g. au_demo44.ap-southeast-2
#   SNOWFLAKE_USER       - service account username
#   SNOWFLAKE_PASSWORD   - service account password (mark as Masked)
#   SNOWFLAKE_ROLE       - e.g. ACCOUNTADMIN
#   SNOWFLAKE_WAREHOUSE  - e.g. ADMIN_XSMALL
#
# The target app and stage are defined in snowflake.yml — do not override them here.

deploy_to_snowflake:
  stage: deploy
  image: python:3.11-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - pip install snowflake-cli-labs --quiet
    - |
      mkdir -p ~/.snowflake
      cat > ~/.snowflake/config.toml <<EOF
      default_connection_name = "${SNOWFLAKE_CONNECTION_NAME}"

      [connections.${SNOWFLAKE_CONNECTION_NAME}]
      account = "${SNOWFLAKE_ACCOUNT}"
      user = "${SNOWFLAKE_USER}"
      password = "${SNOWFLAKE_PASSWORD}"
      role = "${SNOWFLAKE_ROLE}"
      warehouse = "${SNOWFLAKE_WAREHOUSE}"
      EOF
      chmod 600 ~/.snowflake/config.toml
  script:
    - snow streamlit deploy --connection $SNOWFLAKE_CONNECTION_NAME --replace --prune
